# Pain -> relevant product capabilities.
# Replace these generic placeholder feature names with your actual product's
# real feature/module names before using this in a live customer demo.
#
# Each entry has a canonical key plus an "aliases" list — match on the aliases
# first (these are common phrasings from raw discovery notes), falling back to
# the canonical key. If a customer's phrasing doesn't match any alias, don't
# guess silently — flag it per SKILL.md step 2 so this file can be updated.

"VPN disconnects":
  aliases: ["VPN instability", "VPN keeps dropping", "unreliable VPN", "VPN downtime"]
  features:
    - Reliable VPN
    - VPN Failover
    - SD-WAN

"Poor visibility":
  aliases: ["no visibility", "lack of visibility", "can't see what's happening", "disconnected tools"]
