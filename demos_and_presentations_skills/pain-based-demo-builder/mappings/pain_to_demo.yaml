# Pain -> specific demo elements to show (more granular than pain_to_feature.yaml,
# which maps to product capabilities; this maps to what to actually click through).
# Aliases work the same way as in pain_to_feature.yaml.

"Poor visibility":
  aliases: ["no visibility", "lack of visibility"]
  demo:
    - Dashboard walkthrough
    - Sample report generation
    - Live alert view

"Compliance / audit difficulty":
  aliases: ["compliance reporting", "ISO 27001", "ISO27001"]
  demo:
    - Compliance report export
    - Audit log search example
    - ISO 27001 report template walkthrough
    - Policy management screen

"VPN disconnects":
  aliases: ["VPN instability", "unreliable VPN"]
  demo:
    - VPN setup wizard
    - Failover simulation
    - Connection health monitor

"Slow incident response":
  aliases: ["slow incident investigation", "manual threat investigation", "takes hours to investigate"]
  demo:
    - Threat correlation view
    - Guided investigation walkthrough on a sample incident
    - Automated response trigger example

"Unpredictable cloud costs":
  aliases: ["cloud costs too high"]
  demo:
    - Cost dashboard walkthrough
    - Optimization recommendation example
    - Budget alert configuration

"Difficult multi-site management":
  aliases: ["multiple branch offices", "N branch offices"]
  demo:
    - Multi-site console walkthrough
    - Templated new-site deployment example
    - Unified policy push across sites
